services:
  app:
    build:
      context: .
    ports:
      - "${VUSSA_APP_PORT:-3000}:3000"
    environment:
      BIND_ADDRESS: 0.0.0.0:3000
      DATABASE_URL: postgres://vussa_chat:vussa_chat@postgres:5432/vussa_chat
      VALKEY_URL: redis://valkey:6379
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads-data:/data/uploads
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--quiet", "http://127.0.0.1:3000/api/v1/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
  valkey:
    image: valkey/valkey:9.1.0
    ports:
      - "${VUSSA_VALKEY_PORT:-6379}:6379"
    command: ["valkey-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: vussa_chat
      POSTGRES_USER: vussa_chat
      POSTGRES_PASSWORD: vussa_chat
    ports:
      - "${VUSSA_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vussa_chat -d vussa_chat"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  uploads-data:
