{{- if and .Values.frontend.enabled .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vussa.fullname" . }}-frontend
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vussa.name" . }}-frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
