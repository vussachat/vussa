{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "vussa.fullname" . }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vussa.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  endpoints:
    - port: http
      path: /api/v1/metrics
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
