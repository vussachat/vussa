apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vussa.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vussa.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vussa.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "vussa.fullname" . }}
      terminationGracePeriodSeconds: 30
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: {{ include "vussa.name" . }}
      containers:
        - name: vussa
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: BIND_ADDRESS
              value: 0.0.0.0:3000
            - name: COOKIE_SECURE
              value: "true"
          envFrom:
            - secretRef:
                name: {{ include "vussa.fullname" . }}
          securityContext: {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            httpGet: { path: /api/v1/health/ready, port: http }
            periodSeconds: 5
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /api/v1/health/live, port: http }
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet: { path: /api/v1/health/startup, port: http }
            periodSeconds: 5
            failureThreshold: 30
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          resources: {{- toYaml .Values.resources | nindent 12 }}
