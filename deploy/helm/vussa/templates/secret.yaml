{{- if not .Values.externalSecret.name }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "vussa.fullname" . }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "postgres.url is required" .Values.postgres.url | quote }}
  VALKEY_URL: {{ required "valkey.url is required" .Values.valkey.url | quote }}
  {{- if .Values.admin.email }}
  ADMIN_EMAIL: {{ .Values.admin.email | quote }}
  ADMIN_PASSWORD: {{ required "admin.password is required when admin.email is set" .Values.admin.password | quote }}
  {{- end }}
  {{- if .Values.storage.accessKey }}
  STORAGE_ACCESS_KEY: {{ .Values.storage.accessKey | quote }}
  STORAGE_SECRET_KEY: {{ required "storage.secretKey is required when storage.accessKey is set" .Values.storage.secretKey | quote }}
  {{- end }}
  {{- if .Values.recovery.webhookUrl }}
  RECOVERY_WEBHOOK_URL: {{ .Values.recovery.webhookUrl | quote }}
  {{- end }}
{{- end }}
